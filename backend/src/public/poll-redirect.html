<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#050508">
  <title>PollStraw - Open Poll</title>

  <meta name="apple-itunes-app" content="app-id=YOUR_APP_ID">

  <meta property="og:title" content="Vote on this poll - PollStraw">
  <meta property="og:description" content="Tap to vote on this poll in PollStraw">
  <meta property="og:type" content="website">
  <meta property="og:url" content="">
  <meta property="og:image" content="https://pollstraw.com/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Vote on this poll - PollStraw">
  <meta name="twitter:description" content="Tap to vote on this poll in PollStraw">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #050508;
      --bg-card: #0c0c12;
      --bg-elevated: #12121c;
      --border: rgba(255, 255, 255, 0.07);
      --border-strong: rgba(99, 102, 241, 0.35);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent-a: #6366f1;
      --accent-b: #22d3ee;
      --accent-glow: rgba(34, 211, 238, 0.12);
      --success: #34d399;
      --radius-lg: 20px;
      --radius-sm: 12px;
      --font: 'Outfit', system-ui, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 18px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient mesh — unique backdrop */
    .page-ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(99, 102, 241, 0.18), transparent 50%),
        radial-gradient(ellipse 70% 45% at 100% 30%, rgba(34, 211, 238, 0.12), transparent 45%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(99, 102, 241, 0.08), transparent 40%);
    }

    .page-ambient::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.5;
      mix-blend-mode: overlay;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 32px 28px 36px;
      background: linear-gradient(165deg, rgba(18, 18, 28, 0.95) 0%, var(--bg-card) 40%, #0a0a10 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 24px 80px rgba(0, 0, 0, 0.55),
        0 0 120px var(--accent-glow);
    }

    /* Diagonal accent strip */
    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      border-radius: var(--radius-lg) 0 0 var(--radius-lg);
      background: linear-gradient(180deg, var(--accent-a), var(--accent-b));
      opacity: 0.9;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-left: 8px;
    }

    .logo-mark {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.25), rgba(34, 211, 238, 0.15));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
    }

    .logo-mark svg {
      width: 28px;
      height: 28px;
      fill: url(#logoGrad);
    }

    .wordmark {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    h1.visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .poll-title {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 10px;
      padding-left: 8px;
      letter-spacing: -0.02em;
    }

    .poll-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 20px;
      padding-left: 8px;
      text-align: left;
      border-left: 2px solid rgba(99, 102, 241, 0.4);
      padding-left: 14px;
    }

    .results-panel {
      text-align: left;
      margin-bottom: 22px;
      padding: 18px 16px;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
    }

    .results-panel h2,
    .results-panel__title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .results-summary {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .results-stat {
      flex: 1;
      min-width: 88px;
      padding: 12px 10px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 10px;
      border: 1px solid var(--border);
      text-align: center;
    }

    .results-stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a5b4fc, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .results-stat-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .result-row {
      margin-bottom: 16px;
    }

    .result-row:last-child {
      margin-bottom: 0;
    }

    .result-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    .result-label span:first-child {
      flex: 1;
      text-align: left;
      word-break: break-word;
    }

    .result-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .result-bar-track {
      height: 8px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
    }

    .result-bar-fill {
      height: 100%;
      border-radius: 999px;
      min-width: 0;
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
      box-shadow: 0 0 16px rgba(34, 211, 238, 0.25);
    }

    .results-hidden-msg {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.55;
      text-align: center;
      padding: 12px 6px 4px;
    }

    .options-preview {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .options-preview li {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: left;
    }

    .options-preview li:last-child {
      border-bottom: none;
    }

    .status {
      padding: 16px 18px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .status-text {
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--accent-b);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px 22px;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-a) 0%, #4f46e5 50%, var(--accent-b) 100%);
      background-size: 200% 200%;
      color: #fff;
      margin-bottom: 12px;
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.35);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .lead {
      color: var(--text-muted);
      margin-bottom: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .store-buttons {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .store-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 10px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 600;
      border: 1px solid var(--border);
      transition: background 0.2s, border-color 0.2s;
    }

    .store-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(99, 102, 241, 0.4);
    }

    .store-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      opacity: 0.9;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 22px 0;
      color: var(--text-dim);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    .divider::before { margin-right: 14px; }
    .divider::after { margin-left: 14px; }

    .hidden {
      display: none !important;
    }

    .features {
      text-align: left;
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }

    .features h3 {
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: 0.04em;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin-bottom: 10px;
    }

    .feature-item svg {
      width: 16px;
      height: 16px;
      fill: var(--success);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="page-ambient" aria-hidden="true"></div>
  <svg width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#a5b4fc"/>
        <stop offset="100%" style="stop-color:#67e8f9"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="container">
    <div class="brand-row">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
      </div>
      <span class="wordmark">PollStraw</span>
    </div>

    <h1 class="visually-hidden">PollStraw</h1>
    <p class="poll-title" id="pollTitle">Loading poll...</p>
    <p class="poll-desc hidden" id="pollDesc"></p>
    <div id="resultsPanel" class="results-panel hidden" aria-live="polite"></div>

    <div class="status" id="status">
      <span class="loading"></span>
      <span class="status-text">Opening app...</span>
    </div>

    <div id="appInstalled" class="hidden">
      <button type="button" class="btn btn-primary" onclick="openInApp()">
        Open in App
      </button>
    </div>

    <div id="appNotInstalled" class="hidden">
      <p class="lead">
        Get the PollStraw app to vote, create polls, and see live updates.
      </p>

      <div class="store-buttons">
        <a href="#" class="store-btn" id="appStoreBtn">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          App Store
        </a>
        <a href="#" class="store-btn" id="playStoreBtn">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
          </svg>
          Play Store
        </a>
      </div>

      <div class="divider">or</div>

      <button type="button" class="btn btn-secondary" onclick="openInApp()">
        Try opening app anyway
      </button>

      <div class="features">
        <h3>Why get the app?</h3>
        <div class="feature-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          <span>Create unlimited polls</span>
        </div>
        <div class="feature-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          <span>Real-time vote updates</span>
        </div>
        <div class="feature-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          <span>Share via QR code</span>
        </div>
        <div class="feature-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          <span>View detailed analytics</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const pathParts = window.location.pathname.split('/');
    const pollIndex = pathParts.indexOf('poll');
    const shareToken = pollIndex !== -1 ? pathParts[pollIndex + 1] : null;

    const appScheme = 'pollstraw://';
    const deepLinkUrl = shareToken ? `${appScheme}poll/${shareToken}` : appScheme;

    const appStoreUrl = 'https://apps.apple.com/app/pollstraw/id0000000000';
    const playStoreUrl = 'https://play.google.com/store/apps/details?id=com.pollstraw.mobile';

    document.getElementById('appStoreBtn').href = appStoreUrl;
    document.getElementById('playStoreBtn').href = playStoreUrl;

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isAndroid = /Android/.test(navigator.userAgent);

    function openInApp() {
      window.location.href = deepLinkUrl;
    }

    function canShowResults(poll) {
      return poll.hasVoted || !poll.isActive || poll.showResults === 'ALWAYS';
    }

    function resultsHiddenMessage(poll) {
      if (poll.showResults === 'NEVER' && poll.isActive) {
        return 'Live results are not published for this poll. Open the app for more.';
      }
      if (poll.showResults === 'AFTER_VOTE') {
        return 'Vote in the PollStraw app to see results.';
      }
      if (poll.showResults === 'AFTER_DEADLINE') {
        return 'Results will be available after this poll ends.';
      }
      return 'Open the app to see full results.';
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderResults(poll) {
      const panel = document.getElementById('resultsPanel');
      if (!poll || !poll.options || !poll.options.length) {
        panel.classList.add('hidden');
        return;
      }
      panel.classList.remove('hidden');

      const show = canShowResults(poll);

      if (!show) {
        const optionsList = poll.options.map(function (o) {
          return '<li>' + escapeHtml(o.emoji ? o.emoji + ' ' : '') + escapeHtml(o.text) + '</li>';
        }).join('');
        panel.innerHTML =
          '<h2 class="results-panel__title">Options</h2>' +
          '<ul class="options-preview">' + optionsList + '</ul>' +
          '<p class="results-hidden-msg">' + escapeHtml(resultsHiddenMessage(poll)) + '</p>';
        return;
      }

      const rows = poll.options.map(function (o) {
        var pct = typeof o.percentage === 'number' ? o.percentage : 0;
        var vc = typeof o.voteCount === 'number' ? o.voteCount : 0;
        var label = (o.emoji ? o.emoji + ' ' : '') + o.text;
        return (
          '<div class="result-row">' +
          '<div class="result-label"><span>' + escapeHtml(label) + '</span>' +
          '<span class="result-meta">' + vc + ' · ' + pct + '%</span></div>' +
          '<div class="result-bar-track"><div class="result-bar-fill" style="width:' + pct + '%"></div></div>' +
          '</div>'
        );
      }).join('');

      panel.innerHTML =
        '<h2 class="results-panel__title">Results</h2>' +
        '<div class="results-summary">' +
        '<div class="results-stat"><div class="results-stat-value">' + (poll.totalVotes ?? 0) + '</div>' +
        '<div class="results-stat-label">Total votes</div></div>' +
        '<div class="results-stat"><div class="results-stat-value">' + poll.options.length + '</div>' +
        '<div class="results-stat-label">Options</div></div>' +
        '</div>' + rows;
    }

    async function loadPollInfo() {
      const titleEl = document.getElementById('pollTitle');
      const descEl = document.getElementById('pollDesc');

      if (!shareToken) {
        titleEl.textContent = 'Open PollStraw to explore polls';
        return;
      }

      try {
        const response = await fetch('/api/polls/' + encodeURIComponent(shareToken));
        if (!response.ok) {
          titleEl.textContent = 'Poll not found';
          return;
        }
        const data = await response.json();
        var poll = data.success && data.data && data.data.poll ? data.data.poll : null;
        if (!poll) {
          titleEl.textContent = 'Tap to vote on this poll';
          return;
        }

        titleEl.textContent = poll.title;
        document.title = (poll.title ? poll.title + ' · PollStraw' : 'PollStraw');

        if (poll.description) {
          descEl.textContent = poll.description;
          descEl.classList.remove('hidden');
        } else {
          descEl.classList.add('hidden');
        }

        renderResults(poll);

        var og = document.querySelector('meta[property="og:title"]');
        if (og) og.setAttribute('content', poll.title + ' — PollStraw');
        var ogd = document.querySelector('meta[property="og:description"]');
        if (ogd) ogd.setAttribute('content', 'See results and vote on PollStraw');
      } catch (e) {
        titleEl.textContent = 'Tap to vote on this poll';
      }
    }

    loadPollInfo();

    function attemptAppOpen() {
      const statusEl = document.getElementById('status');
      const appNotInstalledEl = document.getElementById('appNotInstalled');

      const timeout = setTimeout(function () {
        statusEl.classList.add('hidden');
        appNotInstalledEl.classList.remove('hidden');
      }, 2500);

      window.location.href = deepLinkUrl;

      document.addEventListener('visibilitychange', function () {
        if (document.hidden) clearTimeout(timeout);
      });
      window.addEventListener('blur', function () {
        clearTimeout(timeout);
      });
    }

    if (isIOS || isAndroid) {
      attemptAppOpen();
    } else {
      document.getElementById('status').classList.add('hidden');
      document.getElementById('appNotInstalled').classList.remove('hidden');
    }
  </script>
</body>
</html>
